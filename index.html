<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tibia Bestiary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  :root {
    --bg:#0d0b08; --bg2:#161210; --bg3:#1e1a15; --bg4:#252018;
    --border:#3a3020; --border2:#5a4a28;
    --gold:#c8952a; --gold2:#e8b84a; --gold3:#f5d070;
    --text:#e8dcc8; --text2:#b8a888; --text3:#887858;
    --red:#cc4422; --red2:#e85a30;
    --green:#4a8840; --green2:#6aaa5a;
    --blue:#3a6888; --blue2:#5a9ab8;
    --ice:#60a8cc; --fire:#dd6622; --holy:#ddcc44;
    --earth:#6a9944; --death:#9944bb; --energy:#8866dd; --physical:#cc8844;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Crimson Text',Georgia,serif; font-size:16px;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  .app-header {
    background:linear-gradient(180deg,#1a1408 0%,#0d0b08 100%);
    border-bottom:2px solid var(--border2);
    padding:14px 24px; display:flex; align-items:center; gap:16px; flex-shrink:0;
  }
  .skull-icon { font-size:28px; filter:drop-shadow(0 0 8px rgba(200,149,42,0.5)); }
  .app-title {
    font-family:'Cinzel',serif; font-size:24px; font-weight:700;
    color:var(--gold2); letter-spacing:3px;
    text-shadow:0 0 20px rgba(200,149,42,0.3);
  }
  .app-subtitle { font-size:12px; color:var(--text3); letter-spacing:1px; }
  .total-badge {
    margin-left:auto; background:var(--bg3); border:1px solid var(--border);
    border-radius:6px; padding:5px 12px;
    font-family:'Cinzel',serif; font-size:12px; color:var(--text2);
  }
  .total-badge span { color:var(--gold); font-weight:600; }
  .app-body { display:flex; flex:1; overflow:hidden; }
  .sidebar {
    width:290px; flex-shrink:0; background:var(--bg2);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .search-box { padding:12px; border-bottom:1px solid var(--border); }
  .search-wrap { position:relative; }
  .search-wrap input {
    width:100%; background:var(--bg3); border:1px solid var(--border2);
    border-radius:6px; color:var(--text);
    font-family:'Crimson Text',serif; font-size:16px;
    padding:9px 12px 9px 36px; outline:none; transition:border-color 0.2s;
  }
  .search-wrap input::placeholder { color:var(--text3); }
  .search-wrap input:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(200,149,42,0.15); }
  .search-icon {
    position:absolute; left:11px; top:50%; transform:translateY(-50%);
    color:var(--text3); font-size:14px; pointer-events:none;
  }
  .filter-row { display:flex; gap:6px; margin-top:8px; }
  .filter-row select {
    flex:1; background:var(--bg3); border:1px solid var(--border);
    border-radius:6px; color:var(--text2);
    font-family:'Crimson Text',serif; font-size:14px;
    padding:5px 8px; outline:none; cursor:pointer;
  }
  .result-count {
    padding:7px 12px; font-size:12px; color:var(--text3);
    border-bottom:1px solid var(--border); letter-spacing:0.5px;
  }
  .monster-list { flex:1; overflow-y:auto; padding:4px; }
  .monster-list::-webkit-scrollbar { width:5px; }
  .monster-list::-webkit-scrollbar-track { background:var(--bg2); }
  .monster-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  .monster-item {
    padding:8px 10px; border-radius:5px; cursor:pointer;
    display:flex; align-items:center; gap:8px;
    transition:background 0.12s; border:1px solid transparent;
  }
  .monster-item:hover { background:var(--bg3); border-color:var(--border); }
  .monster-item.active { background:var(--bg4); border-color:var(--gold); }
  .m-name { font-size:14px; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .monster-item.active .m-name { color:var(--gold2); }
  .m-class-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .m-exp { font-size:11px; color:var(--text3); flex-shrink:0; }
  .main-panel { flex:1; overflow-y:auto; padding:24px; background:var(--bg); }
  .main-panel::-webkit-scrollbar { width:5px; }
  .main-panel::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  .empty-state {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100%; gap:12px; color:var(--text3);
  }
  .empty-state .big-skull { font-size:60px; opacity:0.25; }
  .empty-state p { font-family:'Cinzel',serif; font-size:15px; letter-spacing:2px; }
  .creature-header {
    display:flex; align-items:flex-start; gap:20px;
    margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border);
  }
  .creature-name {
    font-family:'Cinzel',serif; font-size:28px; font-weight:700;
    color:var(--gold2); text-shadow:0 0 30px rgba(200,149,42,0.2); line-height:1.1;
  }
  .creature-class-tag {
    display:inline-block; margin-top:5px; padding:2px 10px;
    border:1px solid var(--border2); border-radius:20px;
    font-size:12px; color:var(--text2); letter-spacing:1px;
  }
  .section-title {
    font-family:'Cinzel',serif; font-size:12px; font-weight:600;
    letter-spacing:2px; color:var(--gold); text-transform:uppercase;
    margin-bottom:12px; display:flex; align-items:center; gap:10px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:24px; }
  .stat-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; transition:border-color 0.2s;
  }
  .stat-card:hover { border-color:var(--border2); }
  .stat-card .sl { font-size:10px; color:var(--text3); letter-spacing:0.5px; margin-bottom:3px; text-transform:uppercase; }
  .stat-card .sv { font-size:20px; font-weight:600; color:var(--text); }
  .stat-card .sv.na { color:var(--text3); font-size:15px; }
  .modifiers-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:24px; }
  .mod-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:7px;
    padding:8px 6px; text-align:center; position:relative; overflow:hidden;
  }
  .mod-card::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
    background:var(--color,transparent); opacity:0.6;
  }
  .mod-card .ml { font-size:10px; color:var(--text3); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:5px; }
  .mod-card .mv { font-size:17px; font-weight:600; }
  .mv-immune { color:var(--text3); opacity:0.5; }
  .mv-strong { color:var(--green2); }
  .mv-normal { color:var(--text2); }
  .mv-weak { color:var(--red2); }
  .mv-vweak { color:#ff4444; }
  .max-dmg-banner {
    background:linear-gradient(135deg,var(--bg3) 0%,#2a1808 100%);
    border:1px solid var(--red); border-radius:10px;
    padding:14px 20px; display:flex; align-items:center; gap:16px; margin-bottom:24px;
  }
  .max-dmg-banner .label { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:var(--text3); text-transform:uppercase; }
  .max-dmg-banner .value { font-size:34px; font-weight:700; color:var(--red2); font-family:'Crimson Text',serif; text-shadow:0 0 20px rgba(204,68,34,0.4); }
  .max-dmg-banner .desc { font-size:12px; color:var(--text3); margin-top:1px; }
  .max-dmg-banner .ico { font-size:26px; margin-left:auto; opacity:0.5; }
  .damage-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:24px; }
  .dmg-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    padding:12px 10px; text-align:center; position:relative; overflow:hidden;
  }
  .dmg-card.has-value { border-color:var(--border2); }
  .dmg-card .dtype { font-size:10px; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:6px; }
  .dmg-card .dval { font-size:24px; font-weight:600; font-family:'Crimson Text',serif; }
  .dmg-card .dval.na { font-size:15px; color:var(--text3); }
  .dmg-card .dbar { position:absolute; bottom:0; left:0; height:3px; background:currentColor; opacity:0.5; }
  .no-results { text-align:center; padding:30px; color:var(--text3); font-style:italic; font-size:14px; }
  .cls-Mammals { background:#8B6914; }
  .cls-Demons { background:#8B1414; }
  .cls-Humans { background:#6B8B14; }
  .cls-Undead,.cls-TheUndead { background:#6B148B; }
  .cls-Elementals { background:#148B8B; }
  .cls-Invertebrates { background:#8B4514; }
  .cls-Amphibians { background:#148B45; }
  .cls-Reptiles { background:#458B14; }
  .cls-Humanoids { background:#145B8B; }
  .cls-default { background:#4a4a4a; }
</style>
</head>

const BY_NAME = {};
MONSTERS.forEach(m => { BY_NAME[m.name.toLowerCase()] = m; });

const classes = [...new Set(MONSTERS.map(m => m.creature_class).filter(Boolean))].sort();
const sel = document.getElementById('class-filter');
classes.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c; sel.appendChild(o);
});

let filtered = [...MONSTERS];
let activeMonster = null;

function clsKey(c) {
  if (!c) return 'default';
  return c.replace(/\s+/g,'').replace('The','');
}

function doSearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const cls = document.getElementById('class-filter').value;
  filtered = MONSTERS.filter(m => {
    const nm = !q || m.name.toLowerCase().includes(q);
    const cm = !cls || m.creature_class === cls;
    return nm && cm;
  });
  renderList();
  if (filtered.length === 1) showMonster(filtered[0]);
  else if (q.length > 2 && filtered.length > 0 && filtered[0].name.toLowerCase() === q) showMonster(filtered[0]);
}

document.getElementById('search-input').addEventListener('input', doSearch);
document.getElementById('class-filter').addEventListener('change', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && filtered.length > 0) showMonster(filtered[0]);
});

function renderList() {
  const list = document.getElementById('monster-list');
  document.getElementById('result-count').textContent = 'Showing ' + filtered.length + ' creature' + (filtered.length !== 1 ? 's' : '');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No creatures found</div>'; return;
  }
  const frag = document.createDocumentFragment();
  filtered.slice(0, 400).forEach(m => {
    const div = document.createElement('div');
    div.className = 'monster-item' + (activeMonster === m.name ? ' active' : '');
    div.dataset.name = m.name;
    const expStr = m.exp != null ? m.exp.toLocaleString() + ' xp' : '— xp';
    div.innerHTML = '<div class="m-class-dot cls-' + clsKey(m.creature_class) + '"></div>'
      + '<div class="m-name">' + m.name + '</div>'
      + '<div class="m-exp">' + expStr + '</div>';
    div.addEventListener('click', () => showMonster(m));
    frag.appendChild(div);
  });
  list.innerHTML = '';
  list.appendChild(frag);
  if (filtered.length > 400) {
    const n = document.createElement('div');
    n.style.cssText = 'text-align:center;padding:10px;font-size:12px;color:#887858;';
    n.textContent = '+ ' + (filtered.length - 400) + ' more — refine search';
    list.appendChild(n);
  }
}

const DMG_COLORS = {
  'Melee':'var(--physical)', 'Fire':'var(--fire)', 'Ice':'var(--ice)',
  'Energy':'var(--energy)', 'Earth':'var(--earth)', 'Holy':'var(--holy)',
  'Death':'var(--death)', 'Life Drain':'#cc4477', 'Mana Drain':'#4477cc',
  'Self Healing':'#44cc77'
};

function fmtMod(val) {
  if (val === null || val === undefined) return {text:'—', cls:'mv-normal'};
  const p = Math.round(val * 100);
  if (p === 0) return {text:'0%', cls:'mv-immune'};
  if (p < 100) return {text:p+'%', cls:'mv-strong'};
  if (p === 100) return {text:'100%', cls:'mv-normal'};
  if (p <= 110) return {text:p+'%', cls:'mv-weak'};
  return {text:p+'%', cls:'mv-vweak'};
}

function showMonster(m) {
  activeMonster = m.name;
  document.querySelectorAll('.monster-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === m.name);
  });

  const mods = [
    {label:'Physical', val:m.phys_mod, color:'var(--physical)'},
    {label:'Fire', val:m.fire_mod, color:'var(--fire)'},
    {label:'Holy', val:m.holy_mod, color:'var(--holy)'},
    {label:'Ice', val:m.ice_mod, color:'var(--ice)'},
    {label:'Energy', val:m.energy_mod, color:'var(--energy)'},
    {label:'Earth', val:m.earth_mod, color:'var(--earth)'},
    {label:'Death', val:m.death_mod, color:'var(--death)'},
  ];

  const dmgs = [
    {label:'Melee', val:m.melee},
    {label:'Fire', val:m.fire_dmg},
    {label:'Ice', val:m.ice_dmg},
    {label:'Energy', val:m.energy_dmg},
    {label:'Earth', val:m.earth_dmg},
    {label:'Holy', val:m.holy_dmg},
    {label:'Death', val:m.death_dmg},
    {label:'Life Drain', val:m.life_drain},
    {label:'Mana Drain', val:m.mana_drain},
    {label:'Self Healing', val:m.self_healing},
  ];

  const maxDmg = m.max_dmg || 0;
  const hasDmg = dmgs.some(d => d.val != null && d.val > 0);

  const modHTML = mods.map(md => {
    const f = fmtMod(md.val);
    return '<div class="mod-card" style="--color:' + md.color + '">'
      + '<div class="ml">' + md.label + '</div>'
      + '<div class="mv ' + f.cls + '">' + f.text + '</div>'
      + '</div>';
  }).join('');

  const dmgHTML = dmgs.map(d => {
    const color = DMG_COLORS[d.label] || 'var(--text2)';
    const hasV = d.val != null && d.val > 0;
    const bw = hasV && maxDmg > 0 ? Math.round((d.val / maxDmg) * 100) : 0;
    return '<div class="dmg-card ' + (hasV ? 'has-value' : '') + '">'
      + '<div class="dtype" style="color:' + color + '">' + d.label + '</div>'
      + '<div class="dval ' + (hasV ? '' : 'na') + '">' + (hasV ? d.val : '—') + '</div>'
      + (hasV ? '<div class="dbar" style="background:' + color + ';width:' + bw + '%"></div>' : '')
      + '</div>';
  }).join('');

  const hpStr = m.hp != null ? ('' + m.hp).replace(/\?/g,'').trim() : null;
  const hpDisp = hpStr ? parseInt(hpStr.replace(/[^0-9]/g,'')).toLocaleString() + (hpStr.includes('?') ? '?' : '') : '<span class="na">—</span>';

  const bannerHTML = hasDmg
    ? '<div class="max-dmg-banner">'
      + '<div><div class="label">Maximum Damage Output</div>'
      + '<div class="value">' + maxDmg.toLocaleString() + '</div>'
      + '<div class="desc">highest single damage type recorded</div></div>'
      + '<div class="ico">&#9876;</div></div>'
    : '<div class="max-dmg-banner" style="border-color:var(--border)">'
      + '<div><div class="label">Damage Data</div>'
      + '<div class="value" style="color:var(--text3);font-size:18px">Not Available</div>'
      + '<div class="desc">No combat data recorded</div></div></div>';

  document.getElementById('main-panel').innerHTML =
    '<div class="creature-header"><div>'
    + '<div class="creature-name">' + m.name + '</div>'
    + '<div class="creature-class-tag">' + (m.creature_class || 'Unknown') + '</div>'
    + '</div></div>'

    + '<div class="section-title">Base Stats</div>'
    + '<div class="stats-grid">'
    + '<div class="stat-card"><div class="sl">Experience</div><div class="sv">' + (m.exp != null ? m.exp.toLocaleString() : '<span class="na">—</span>') + '</div></div>'
    + '<div class="stat-card"><div class="sl">Hit Points</div><div class="sv">' + hpDisp + '</div></div>'
    + '<div class="stat-card"><div class="sl">Armor</div><div class="sv">' + (m.armor != null ? m.armor : '<span class="na">—</span>') + '</div></div>'
    + '<div class="stat-card"><div class="sl">Class</div><div class="sv" style="font-size:14px;color:var(--text2)">' + (m.creature_class || '—') + '</div></div>'
    + '</div>'

    + '<div class="section-title">Damage Modifiers — Given to Monster</div>'
    + '<div class="modifiers-grid">' + modHTML + '</div>'

    + bannerHTML

    + '<div class="section-title">Damage Taken — From Monster</div>'
    + '<div class="damage-grid">' + dmgHTML + '</div>';
}

renderList();
</script>
